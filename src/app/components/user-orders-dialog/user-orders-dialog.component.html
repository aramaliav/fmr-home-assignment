<h2 mat-dialog-title>Orders – {{ user.name }}</h2>
<mat-dialog-content>
  <section class="add-order">
    <h3>Add order</h3>
    <div class="add-form mat-form-row">
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Total</mat-label>
        <input
          matInput
          type="number"
          min="0"
          step="0.01"
          [ngModel]="newTotal()"
          (ngModelChange)="newTotal.set(+$event)"
          name="newTotal"
        />
      </mat-form-field>
      <button mat-flat-button color="primary" (click)="addOrderForm()">
        Add order
      </button>
    </div>
  </section>
  <div class="table-wrapper">
    <table mat-table [dataSource]="(orders$ | async) ?? []" class="mat-elevation-z0">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let order">{{ order.id }}</td>
      </ng-container>
      <ng-container matColumnDef="total">
        <th mat-header-cell *matHeaderCellDef>Total</th>
        <td mat-cell *matCellDef="let order">
          @if (editingId() === order.id) {
            <input
              type="number"
              min="0"
              step="0.01"
              [ngModel]="editTotal()"
              (ngModelChange)="editTotal.set(+$event)"
              class="edit-input"
            />
          } @else {
            {{ order.total }}
          }
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let order">
          @if (editingId() === order.id) {
            <button mat-icon-button (click)="saveEdit()" matTooltip="Save">
              <mat-icon>check</mat-icon>
            </button>
            <button mat-icon-button (click)="cancelEdit()" matTooltip="Cancel">
              <mat-icon>close</mat-icon>
            </button>
          } @else {
            <button mat-icon-button (click)="startEdit(order)" matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="removeOrderById(order)" matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          }
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" [attr.colspan]="displayedColumns.length">
          No orders yet.
        </td>
      </tr>
    </table>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
